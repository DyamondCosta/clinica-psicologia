<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos — Ana Maria Caetano</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar"></div>

<div class="main">
    <div class="header">
        <h1>◷ <span class="header-gold">Agendamentos</span></h1>
        <p>Agenda completa de sessões</p>
    </div>

    <div class="container">

        <div class="form-section">
            <h2>Novo Agendamento</h2>
            <input type="hidden" id="ag_id">
            <div class="form-grid">
                <div class="form-group">
                    <label>Paciente *</label>
                    <select id="ag_paciente" onchange="carregarPacotesDoSelect()">
                        <option value="">Selecione o paciente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipo de Sessão *</label>
                    <select id="ag_tipo" onchange="alternarTipo()">
                        <option value="pacote">Pacote</option>
                        <option value="avulso">Avulso</option>
                    </select>
                </div>
                <div class="form-group" id="campo-pacote">
                    <label>Pacote do Paciente</label>
                    <select id="ag_pacote">
                        <option value="">Selecione o pacote</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data da Sessão *</label>
                    <input id="ag_data" type="date">
                </div>
                <div class="form-group">
                    <label>Horário *</label>
                    <input id="ag_horario" type="time">
                </div>
                <div class="form-group">
                    <label>Duração (minutos)</label>
                    <input id="ag_duracao" type="number" value="50" min="10" max="180">
                </div>
                <div class="form-group" id="campo-valor-avulso" style="display:none;">
                    <label>Valor Cobrado (R$)</label>
                    <input id="ag_valor" type="number" placeholder="Ex: 180.00">
                </div>
                <div class="form-group" id="campo-pagamento-avulso" style="display:none;">
                    <label>Forma de Pagamento</label>
                    <select id="ag_pagamento">
                        <option>PIX</option>
                        <option>Dinheiro</option>
                        <option>Cartão Débito</option>
                        <option>Cartão Crédito</option>
                        <option>Transferência</option>
                    </select>
                </div>
                <div class="form-group form-full">
                    <label>Observações</label>
                    <textarea id="ag_obs" placeholder="Observações sobre o agendamento..."></textarea>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="salvarAgendamento()">💾 Salvar Agendamento</button>
                <button class="btn btn-outline" onclick="limparAg()">Limpar</button>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2>Agenda</h2>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <select id="filtro-periodo" onchange="carregarAgendamentos()" style="max-width:160px;">
                        <option value="todos">Todos</option>
                        <option value="hoje">Hoje</option>
                        <option value="semana">Esta semana</option>
                        <option value="mes">Este mês</option>
                    </select>
                    <input id="filtro-data" type="date" onchange="carregarAgendamentos()" style="max-width:160px;">
                    <select id="filtro-status" onchange="filtrarLista()" style="max-width:150px;">
                        <option value="">Todos status</option>
                        <option value="agendado">Agendados</option>
                        <option value="realizado">Realizados</option>
                        <option value="cancelado">Cancelados</option>
                        <option value="faltou">Faltou</option>
                    </select>
                    <input id="filtro-paciente" placeholder="Buscar paciente..." onkeyup="filtrarLista()" style="max-width:200px;">
                </div>
            </div>
            <div id="lista-agendamentos"></div>
        </div>

    </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-editar">
    <div class="modal">
        <h2>✏️ Editar Agendamento</h2>
        <input type="hidden" id="edit_id">
        <div class="form-group" style="margin-bottom:14px;">
            <label>Data</label>
            <input id="edit_data" type="date">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
            <label>Horário</label>
            <input id="edit_horario" type="time">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
            <label>Duração (minutos)</label>
            <input id="edit_duracao" type="number" min="10" max="180">
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label>Observações</label>
            <textarea id="edit_obs"></textarea>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="salvarEdicao()">💾 Salvar</button>
            <button class="btn btn-outline" onclick="fecharModal('modal-editar')">Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL DAR BAIXA -->
<div class="modal-overlay" id="modal-baixa">
    <div class="modal">
        <h2>✅ Registrar Sessão Realizada</h2>
        <input type="hidden" id="baixa_id">

        <div style="background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:16px;margin-bottom:20px;">
            <div id="baixa-info" style="font-size:14px;color:var(--text);line-height:1.8;"></div>
        </div>

        <div class="form-group" style="margin-bottom:14px;">
            <label>Valor Recebido (R$) *</label>
            <input id="baixa_valor" type="number" placeholder="Ex: 180.00">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
            <label>Forma de Pagamento *</label>
            <select id="baixa_pagamento">
                <option>PIX</option>
                <option>Dinheiro</option>
                <option>Cartão Débito</option>
                <option>Cartão Crédito</option>
                <option>Transferência</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label>Observações</label>
            <textarea id="baixa_obs" placeholder="Observações sobre o pagamento..."></textarea>
        </div>
        <div class="btn-group">
            <button class="btn btn-green" onclick="confirmarBaixa()">✅ Confirmar Sessão e Pagamento</button>
            <button class="btn btn-outline" onclick="fecharModal('modal-baixa')">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let agendamentosCarregados = [];
let agendamentoSelecionado = null;

function hojeStr() { return new Date().toISOString().split('T')[0]; }

function diasAte(dataStr) {
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const data = new Date(dataStr + 'T00:00:00');
    return Math.round((data - hoje) / (1000*60*60*24));
}

function alternarTipo() {
    const tipo = document.getElementById('ag_tipo').value;
    document.getElementById('campo-pacote').style.display = tipo==='pacote'?'flex':'none';
    document.getElementById('campo-valor-avulso').style.display = tipo==='avulso'?'flex':'none';
    document.getElementById('campo-pagamento-avulso').style.display = tipo==='avulso'?'flex':'none';
}

async function carregarPacientesSelect() {
    const { data } = await db.from('pacientes').select('id,nome').eq('ativo',true).order('nome');
    const sel = document.getElementById('ag_paciente');
    sel.innerHTML = '<option value="">Selecione o paciente</option>';
    (data||[]).forEach(p => {
        sel.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
    });
}

async function carregarPacotesDoSelect() {
    const pacienteId = document.getElementById('ag_paciente').value;
    const sel = document.getElementById('ag_pacote');
    sel.innerHTML = '<option value="">Selecione</option>';
    if (!pacienteId) return;
    const { data } = await db.from('pacientes_pacotes')
        .select('id,total_sessoes,sessoes_restantes,pacotes_modelo(nome)')
        .eq('paciente_id', pacienteId).eq('status','ativo');
    if (!data||!data.length) {
        sel.innerHTML = '<option value="">Nenhum pacote ativo</option>';
        return;
    }
    (data||[]).forEach(pk => {
        sel.innerHTML += `<option value="${pk.id}">
            ${pk.pacotes_modelo?.nome||'Pacote'} — ${pk.sessoes_restantes} sessões restantes
        </option>`;
    });
}

async function salvarAgendamento() {
    const usuario = JSON.parse(sessionStorage.getItem('usuario_clinica'));
    const id = document.getElementById('ag_id').value;
    const pacienteId = document.getElementById('ag_paciente').value;
    const tipo = document.getElementById('ag_tipo').value;
    const data_sessao = document.getElementById('ag_data').value;
    const horario = document.getElementById('ag_horario').value;
    const duracao = document.getElementById('ag_duracao').value || 50;
    const obs = document.getElementById('ag_obs').value;
    const pacoteId = document.getElementById('ag_pacote').value;

    if (!pacienteId) { alert('Selecione um paciente.'); return; }
    if (!data_sessao) { alert('Informe a data da sessão.'); return; }
    if (!horario) { alert('Informe o horário.'); return; }
    if (tipo==='pacote' && !pacoteId) { alert('Selecione um pacote ativo.'); return; }

    if (tipo==='pacote' && pacoteId) {
        const { data: pk } = await db.from('pacientes_pacotes')
            .select('sessoes_restantes').eq('id', pacoteId).single();
        if (pk && pk.sessoes_restantes <= 0) {
            alert('Este pacote não tem sessões disponíveis! Renove o pacote primeiro.');
            return;
        }
    }

    const payload = {
        paciente_id: pacienteId,
        psicologa_id: usuario?.id,
        pacote_paciente_id: tipo==='pacote' ? pacoteId : null,
        tipo, data_sessao, horario,
        duracao_minutos: duracao,
        status: 'agendado',
        observacoes: obs
    };

    if (id) {
        await db.from('agendamentos').update(payload).eq('id', id);
        alert('✅ Agendamento atualizado!');
    } else {
        await db.from('agendamentos').insert([payload]);
        alert('✅ Agendamento salvo!');
    }
    limparAg();
    carregarAgendamentos();
}

// ABRE MODAL DE BAIXA
async function abrirBaixa(id) {
    const { data: ag } = await db.from('agendamentos')
        .select('*, pacientes(nome), pacientes_pacotes(sessoes_restantes, pacotes_modelo(nome))')
        .eq('id', id).single();
    if (!ag) return;

    agendamentoSelecionado = ag;
    document.getElementById('baixa_id').value = id;
    document.getElementById('baixa_valor').value = '';
    document.getElementById('baixa_obs').value = '';

    const restantes = ag.pacientes_pacotes?.sessoes_restantes || 0;
    document.getElementById('baixa-info').innerHTML = `
        <strong>Paciente:</strong> ${ag.pacientes?.nome||'—'}<br>
        <strong>Data:</strong> ${ag.data_sessao?.split('-').reverse().join('/')}<br>
        <strong>Horário:</strong> ${ag.horario?.slice(0,5)}<br>
        <strong>Tipo:</strong> ${ag.tipo==='avulso'?'Sessão Avulsa':ag.pacientes_pacotes?.pacotes_modelo?.nome||'Pacote'}<br>
        ${ag.tipo==='pacote'?`<strong>Sessões restantes após baixa:</strong> <span style="color:${restantes<=2?'#e07070':'#4daa70'}">${Math.max(0,restantes-1)}</span>`:''}
    `;

    document.getElementById('modal-baixa').classList.add('open');
}

async function confirmarBaixa() {
    const id = document.getElementById('baixa_id').value;
    const valor = Number(document.getElementById('baixa_valor').value);
    const pagamento = document.getElementById('baixa_pagamento').value;
    const obs = document.getElementById('baixa_obs').value;
    const ag = agendamentoSelecionado;

    if (!valor || valor <= 0) { alert('Informe o valor recebido.'); return; }

    // Atualiza status do agendamento
    await db.from('agendamentos').update({
        status: 'realizado',
        valor_cobrado: valor,
        forma_pagamento: pagamento
    }).eq('id', id);

    // Desconta do pacote
    if (ag.tipo==='pacote' && ag.pacote_paciente_id) {
        const { data: pk } = await db.from('pacientes_pacotes')
            .select('*').eq('id', ag.pacote_paciente_id).single();
        if (pk) {
            const novoReal = (pk.sessoes_realizadas||0) + 1;
            const novoRest = Math.max(0,(pk.sessoes_restantes||0) - 1);
            await db.from('pacientes_pacotes').update({
                sessoes_realizadas: novoReal,
                sessoes_restantes: novoRest,
                status: novoRest===0 ? 'concluido' : 'ativo'
            }).eq('id', ag.pacote_paciente_id);
        }
    }

    // Lança no financeiro
    await db.from('financeiro').insert([{
        paciente_id: ag.paciente_id,
        agendamento_id: Number(id),
        tipo: 'ENTRADA',
        descricao: ag.tipo==='avulso'
            ? `Sessão avulsa — ${ag.pacientes?.nome||'Paciente'}`
            : `Sessão de pacote — ${ag.pacientes?.nome||'Paciente'}`,
        valor,
        forma_pagamento: pagamento,
        data_movimento: ag.data_sessao,
        observacoes: obs
    }]);

    alert('✅ Sessão realizada e pagamento registrado!');
    fecharModal('modal-baixa');
    agendamentoSelecionado = null;
    carregarAgendamentos();
}

async function marcarFalta(id) {
    if (!confirm('Marcar falta para este paciente?')) return;
    await db.from('agendamentos').update({ status:'faltou' }).eq('id',id);
    carregarAgendamentos();
}

async function cancelarAgendamento(id) {
    if (!confirm('Cancelar este agendamento?')) return;
    await db.from('agendamentos').update({ status:'cancelado' }).eq('id',id);
    carregarAgendamentos();
}

async function excluirAgendamento(id) {
    if (!confirm('EXCLUIR permanentemente este agendamento?')) return;
    await db.from('agendamentos').delete().eq('id',id);
    carregarAgendamentos();
}

function abrirEdicao(ag) {
    document.getElementById('edit_id').value = ag.id;
    document.getElementById('edit_data').value = ag.data_sessao||'';
    document.getElementById('edit_horario').value = ag.horario||'';
    document.getElementById('edit_duracao').value = ag.duracao_minutos||50;
    document.getElementById('edit_obs').value = ag.observacoes||'';
    document.getElementById('modal-editar').classList.add('open');
}

async function salvarEdicao() {
    const id = document.getElementById('edit_id').value;
    const data_sessao = document.getElementById('edit_data').value;
    const horario = document.getElementById('edit_horario').value;
    const duracao = document.getElementById('edit_duracao').value;
    const obs = document.getElementById('edit_obs').value;
    if (!data_sessao||!horario) { alert('Preencha data e horário.'); return; }
    await db.from('agendamentos').update({
        data_sessao, horario, duracao_minutos: duracao, observacoes: obs
    }).eq('id', id);
    alert('✅ Agendamento atualizado!');
    fecharModal('modal-editar');
    carregarAgendamentos();
}

function fecharModal(id) {
    document.getElementById(id).classList.remove('open');
}

async function carregarAgendamentos() {
    const periodo = document.getElementById('filtro-periodo').value;
    const filtroData = document.getElementById('filtro-data').value;
    const hoje = hojeStr();

    let query = db.from('agendamentos')
        .select('*, pacientes(nome), pacientes_pacotes(sessoes_restantes, pacotes_modelo(nome))')
        .order('data_sessao', { ascending: false })
        .order('horario');

    if (filtroData) {
        query = query.eq('data_sessao', filtroData);
    } else if (periodo==='hoje') {
        query = query.eq('data_sessao', hoje);
    } else if (periodo==='semana') {
        const fim = new Date(); fim.setDate(fim.getDate()+7);
        query = query.gte('data_sessao', hoje).lte('data_sessao', fim.toISOString().split('T')[0]);
    } else if (periodo==='mes') {
        query = query.gte('data_sessao', hoje.slice(0,7)+'-01').lte('data_sessao', hoje.slice(0,7)+'-31');
    }

    const { data } = await query;
    agendamentosCarregados = data||[];
    filtrarLista();
}

function filtrarLista() {
    const texto  = document.getElementById('filtro-paciente').value.toLowerCase();
    const status = document.getElementById('filtro-status').value;
    let lista = agendamentosCarregados;
    if (texto)  lista = lista.filter(ag => (ag.pacientes?.nome||'').toLowerCase().includes(texto));
    if (status) lista = lista.filter(ag => ag.status===status);
    renderizarAgendamentos(lista);
}

function renderizarAgendamentos(lista) {
    const div = document.getElementById('lista-agendamentos');
    if (!lista.length) {
        div.innerHTML = '<div class="empty-state"><div class="empty-icon">◷</div><p>Nenhum agendamento encontrado.</p></div>';
        return;
    }
    div.innerHTML = `<table>
        <thead><tr>
            <th>Data</th><th>Horário</th><th>Paciente</th><th>Tipo</th><th>Sessões</th><th>Valor</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody>
        ${lista.map(ag => {
            const data = ag.data_sessao?ag.data_sessao.split('-').reverse().join('/'):'—';
            const dias = diasAte(ag.data_sessao);
            const horario = ag.horario?ag.horario.slice(0,5):'—';
            const rest = ag.pacientes_pacotes?.sessoes_restantes;
            const restStr = ag.tipo==='pacote' && rest!==undefined
                ? `<span class="sessoes-badge ${rest<=1?'critico':rest<=2?'alerta':'ok'}">${rest}</span>`
                : '<span style="color:var(--text-muted);font-size:12px;">Avulso</span>';

            let dataLabel = data;
            if (ag.status==='agendado') {
                if (dias===0) dataLabel += ' <span style="color:#e07070;font-size:11px;font-weight:700;">HOJE</span>';
                else if (dias===1) dataLabel += ' <span style="color:#E8C97A;font-size:11px;">AMANHÃ</span>';
                else if (dias>0 && dias<=7) dataLabel += ` <span style="color:#9A9080;font-size:11px;">${dias}d</span>`;
            }

            const valorStr = ag.valor_cobrado
                ? `<span style="color:#4daa70;font-weight:600;">R$ ${Number(ag.valor_cobrado).toFixed(2)}</span>`
                : `<span style="color:var(--text-muted);font-size:12px;">—</span>`;

            const acoes = ag.status==='agendado' ? `
                <div style="display:flex;gap:5px;flex-wrap:wrap;">
                    <button class="btn btn-green btn-sm" onclick="abrirBaixa(${ag.id})" title="Realizar sessão">✅ Realizar</button>
                    <button class="btn btn-outline btn-sm" onclick="abrirEdicao(${JSON.stringify(ag).replace(/"/g,'&quot;')})" title="Editar">✏️</button>
                    <button class="btn btn-outline btn-sm" onclick="marcarFalta(${ag.id})" title="Falta">❌</button>
                    <button class="btn btn-danger btn-sm" onclick="cancelarAgendamento(${ag.id})" title="Cancelar">🚫</button>
                    <button class="btn btn-danger btn-sm" onclick="excluirAgendamento(${ag.id})" title="Excluir">🗑️</button>
                </div>`
                : `<div style="display:flex;gap:5px;">
                    <span class="status status-${ag.status}">${ag.status}</span>
                    <button class="btn btn-danger btn-sm" onclick="excluirAgendamento(${ag.id})">🗑️</button>
                </div>`;

            return `<tr>
                <td>${dataLabel}</td>
                <td><strong>${horario}</strong></td>
                <td><a href="prontuario.html?id=${ag.paciente_id}"
                    style="color:var(--gold);text-decoration:none;font-weight:500;">
                    ${ag.pacientes?.nome||'—'}</a></td>
                <td>${ag.tipo==='avulso'?'Avulso':ag.pacientes_pacotes?.pacotes_modelo?.nome||'Pacote'}</td>
                <td>${restStr}</td>
                <td>${valorStr}</td>
                <td><span class="status status-${ag.status}">${ag.status}</span></td>
                <td>${acoes}</td>
            </tr>`;
        }).join('')}
        </tbody>
    </table>`;
}

function limparAg() {
    ['ag_id','ag_data','ag_horario','ag_obs'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value='';
    });
    document.getElementById('ag_paciente').value='';
    document.getElementById('ag_tipo').value='pacote';
    document.getElementById('ag_duracao').value=50;
    alternarTipo();
}

carregarPacientesSelect();
carregarAgendamentos();
</script>
</body>
</html>
